name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-artifacts:
    name: Release build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build shared library
        run: cmake --build build --config Release

      - name: Collect release payload (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            ext="dylib"
          else
            ext="so"
          fi
          lib="$(find build -type f \( -name "libsciml_sparse_ffi.${ext}" -o -name "sciml_sparse_ffi.${ext}" \) | head -n 1)"
          if [[ -z "${lib}" ]]; then
            echo "Shared library not found"
            exit 1
          fi
          mkdir -p dist/include dist/lib
          cp -r c_include/* dist/include/
          cp "${lib}" "dist/lib/libsciml_sparse_ffi.${ext}"
          cp LICENSE* dist/ 2>/dev/null || true
          cp README* dist/ 2>/dev/null || true
          tar -czf "sciml-sparse-ffi-${{ matrix.os }}.tar.gz" -C dist .

      - name: Collect release payload (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path build -Recurse -Filter "*sciml_sparse_ffi*.dll" | Select-Object -First 1
          if (-not $dll) {
            Write-Error "Shared library not found"
            exit 1
          }
          New-Item -Path dist/include -ItemType Directory -Force | Out-Null
          New-Item -Path dist/lib -ItemType Directory -Force | Out-Null
          Copy-Item c_include/* dist/include/ -Force
          Copy-Item $dll.FullName dist/lib/libsciml_sparse_ffi.dll -Force
          if (Test-Path LICENSE) { Copy-Item LICENSE dist/ -Force }
          if (Test-Path README.md) { Copy-Item README.md dist/ -Force }
          Compress-Archive -Path dist/* -DestinationPath "sciml-sparse-ffi-${{ matrix.os }}.zip" -Force

      - name: Upload workflow artifacts (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: sciml-sparse-ffi-${{ matrix.os }}
          path: sciml-sparse-ffi-${{ matrix.os }}.tar.gz

      - name: Upload workflow artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: sciml-sparse-ffi-${{ matrix.os }}
          path: sciml-sparse-ffi-${{ matrix.os }}.zip

      - name: Publish GitHub Release assets (Unix)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: sciml-sparse-ffi-${{ matrix.os }}.tar.gz
          generate_release_notes: true

      - name: Publish GitHub Release assets (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: sciml-sparse-ffi-${{ matrix.os }}.zip
          generate_release_notes: true

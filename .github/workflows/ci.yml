name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.os }} / Julia ${{ matrix.julia-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        julia-version: ['1.10', '1.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build shared library
        run: cmake --build build --config Release

      - name: Normalize shared library path (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            ext="dylib"
          else
            ext="so"
          fi
          found="$(find build -type f \( -name "libsciml_sparse_ffi.${ext}" -o -name "sciml_sparse_ffi.${ext}" \) | head -n 1)"
          if [[ -z "${found}" ]]; then
            echo "Shared library not found in build/"
            exit 1
          fi
          cp "${found}" "build/libsciml_sparse_ffi.${ext}"

      - name: Normalize shared library path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path build -Recurse -Filter "*sciml_sparse_ffi*.dll" | Select-Object -First 1
          if (-not $dll) {
            Write-Error "Shared library not found in build/"
            exit 1
          }
          Copy-Item $dll.FullName "build/libsciml_sparse_ffi.dll" -Force

      - name: Instantiate dependencies
        run: julia --project=. -e "using Pkg; Pkg.instantiate()"

      - name: Run tests
        run: julia --project=. -e "using Pkg; Pkg.test(coverage=true)"

      - name: Process coverage
        if: runner.os == 'Linux' && matrix.julia-version == '1.11'
        uses: julia-actions/julia-processcoverage@v1

      - name: Upload coverage to Codecov
        if: runner.os == 'Linux' && matrix.julia-version == '1.11'
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
